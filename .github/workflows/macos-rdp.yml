name: macOS RDP (VNC + RDP + Tailscale)

on:
  workflow_dispatch:

jobs:
  macos-rdp:
    runs-on: macos-latest
    timeout-minutes: 3600

    steps:
      - name: Create macOS User with Secure Password
        run: |
          PASSWORD="Sarathi@1409"
          sysadminctl -addUser remoteuser -fullName "Remote User" -password "$PASSWORD" -admin 2>/dev/null || true
          sysadminctl -resetPasswordFor remoteuser -newPassword "$PASSWORD" 2>/dev/null || true
          echo "REMOTE_USER=remoteuser" >> $GITHUB_ENV
          echo "REMOTE_PASSWORD=$PASSWORD" >> $GITHUB_ENV
          echo "REMOTE_PORT=5900" >> $GITHUB_ENV

      - name: Enable Built-in Screen Sharing (VNC)
        run: |
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
            -restart -agent -privs -all

          echo "$REMOTE_PASSWORD" | sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -setvncpw 2>/dev/null || true

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -configure -allowAccessFor -specifiedUsers 2>/dev/null || true

          sudo dseditgroup -o edit -a "$REMOTE_USER" -t user com.apple.access_screensharing 2>/dev/null || \
          sudo dseditgroup -o edit -a "$REMOTE_USER" -t user com.apple.access_screensharing-disabled 2>/dev/null || true

          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate -configure -access -on \
            -users "$REMOTE_USER" \
            -restart -agent -privs -all

          echo "Screen Sharing (VNC) enabled on port $REMOTE_PORT"

      - name: Install and Start xrdp (RDP Server)
        run: |
          brew install openssl automake libtool pkgconfig nasm pixman

          brew install --cask xquartz 2>/dev/null || true

          curl -L -o /tmp/xrdp.tar.gz \
            "https://github.com/neutrinolabs/xrdp/releases/download/v0.10.6/xrdp-0.10.6.tar.gz"
          tar xzf /tmp/xrdp.tar.gz -C /tmp

          cd /tmp/xrdp-0.10.6
          ./configure PKG_CONFIG_PATH="/opt/X11/lib/pkgconfig:$(brew --prefix)/opt/openssl/lib/pkgconfig" \
            --prefix=/usr/local --sysconfdir=/etc \
            --enable-vnc --disable-xorg
          make -j$(sysctl -n hw.ncpu)
          sudo make install

          sudo mkdir -p /etc/xrdp
          cat > /tmp/xrdp.ini << 'XEOF'
          [Globals]
          ini_version=1
          port=3389
          fork=false
          tcp_nodelay=true
          max_bpp=32

          [xrdp1]
          name=ScreenSharing Session
          lib=libvnc.dylib
          ip=127.0.0.1
          port=5900
          username=ask
          password=ask
          XEOF
          sudo cp /tmp/xrdp.ini /etc/xrdp/xrdp.ini

          sudo pkill xrdp 2>/dev/null || true
          sleep 1
          sudo xrdp --nodaemon --config /etc/xrdp/xrdp.ini &
          sleep 3
          echo "xrdp (RDP) listening on port 3389"

      - name: Install Tailscale
        run: |
          TS_URL=$(curl -sL "https://pkgs.tailscale.com/stable/" | grep -oE 'Tailscale-[0-9]+\.[0-9]+\.[0-9]+-macos\.pkg' | head -1)
          curl -fsSL -o /tmp/Tailscale.pkg "https://pkgs.tailscale.com/stable/$TS_URL"
          sudo installer -pkg /tmp/Tailscale.pkg -target /

      - name: Connect to Tailscale
        run: |
          sudo tailscale up \
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} \
            --hostname=mac-runner-${{ github.run_id }}

          TS_IP=""
          for i in $(seq 1 10); do
            TS_IP=$(sudo tailscale ip -4 2>/dev/null)
            if [ -n "$TS_IP" ]; then break; fi
            sleep 5
          done

          if [ -z "$TS_IP" ]; then
            echo "Failed to get Tailscale IP"
            exit 1
          fi
          echo "TAILSCALE_IP=$TS_IP" >> $GITHUB_ENV
          echo "Connected to Tailscale. IP: $TS_IP"

      - name: Display Connection Info
        run: |
          echo ""
          echo "=========================================="
          echo "  macOS REMOTE ACCESS"
          echo "=========================================="
          echo "  VNC Address:   $TAILSCALE_IP:5900"
          echo "  RDP Address:   $TAILSCALE_IP:3389"
          echo "  Username:      $REMOTE_USER"
          echo "  Password:      $REMOTE_PASSWORD"
          echo "=========================================="
          echo ""
          echo "VNC: Use any VNC client (RealVNC, TigerVNC, etc.)"
          echo "RDP: Use Windows Remote Desktop (mstsc.exe)"
          echo ""
          echo "Ensure your client is on the same Tailscale network."

      - name: Maintain Connection
        run: |
          while true; do
            echo "[$(date)] RDP Active - Address: $TAILSCALE_IP:3389 | User: $REMOTE_USER"
            sleep 300
          done
